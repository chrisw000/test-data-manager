name: TDM PR gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write   # SARIF upload → inline PR annotations

jobs:
  tdm-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install TDM
        run: dotnet tool install --global Tdm.Tool

      # Grammar, entity resolution and policy — checked before any data exists.
      - name: TDM validate (no database needed)
        uses: chrisw000/test-data-manager/.github/actions/tdm@main
        with:
          command: validate
          settings: tdm.settings.json
          report-sarif: output/tdm-validate.sarif
          report-junit: output/tdm-validate.junit.xml

      # The editor model must not drift from the resolved schema.
      - name: Model drift check
        run: |
          tdm export-model --settings tdm.settings.json --out tdm.model.json
          git diff --exit-code tdm.model.json

      - name: Upload SARIF (PR annotations)
        if: ${{ always() && hashFiles('output/tdm-validate.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: output/tdm-validate.sarif
          category: tdm
