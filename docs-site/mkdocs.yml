site_name: TDM — Gherkin-driven Test Data Manager
site_url: https://chrisw000.github.io/test-data-manager/
repo_url: https://github.com/chrisw000/test-data-manager
repo_name: chrisw000/test-data-manager

theme:
  name: material
  palette:
    - scheme: default
      toggle: { icon: material/brightness-7, name: Dark mode }
    - scheme: slate
      toggle: { icon: material/brightness-4, name: Light mode }
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

# W5-D2: persona-first IA — routed home, Start here, task-first guides (filled by
# W5-P3..P5), reference. Guides carry tour_prev/tour_next front matter; lint-tour.sh
# asserts the guided-tour chain is a single unbroken path.
nav:
  - Home: index.md
  - Start here:
      - Getting started: start/getting-started.md
      - Concepts: start/concepts.md
      - Guided tour: start/tour.md
  - Guides:
      - Daily use for QAs: guides/daily-use-qa.md
      - Daily use for developers: guides/daily-use-dev.md
      - Editor setup: guides/editor-setup.md
      - CI — validate, report, gate: guides/ci.md
      - CD & environments: guides/cd-environments.md
      - Performance testing & tracking: guides/performance-testing.md
      - Statistical generation: guides/statistical-generation.md
      - Profiling production shapes: guides/profiling-production-shapes.md
      - Multi-domain identity alignment: guides/multi-domain-identity.md
      - API seeding: guides/api-seeding.md
      - Seed packs: guides/seed-packs.md
      - TestContainers & the provider matrix: guides/testcontainers.md
      - Testing complex domains: guides/complex-domains.md
  - Slides:
      - Engineering Forum deck: slides/index.md
  - Reference:
      - Grammar: reference/grammar.md
      - Configuration: reference/configuration.md
      - Convention profiles: reference/profiles.md
      - CLI: reference/cli.md
      - Reports & the manifest: reference/reports-and-manifest.md
      - Plugin packaging: reference/plugin-packaging.md
      - Troubleshooting: reference/troubleshooting.md
      - Decision log: reference/decisions.md

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  # W5-D4: guide commands are included from docs-site/snippets/*.sh — the same files
  # the docs-verify CI job executes against the sample workspace. check_paths makes a
  # missing snippet a build error, not a silently empty code block.
  - pymdownx.snippets:
      base_path: ['docs-site/snippets', 'snippets']
      check_paths: true
  # Mermaid diagrams render client-side from Material's bundled copy — no CDN, matching
  # the zero-external-dependency posture (W5-D1).
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - assets/interactive/pipeline-walkthrough.css
  - assets/interactive/distribution-playground.css
  - assets/interactive/multi-domain.css
extra_javascript:
  - assets/interactive/pipeline-walkthrough.js
  - assets/interactive/distribution-playground.js
  - assets/interactive/identity-explorer.js
  - assets/interactive/multi-domain-map.js
