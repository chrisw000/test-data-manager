name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # For SARIF upload → inline PR annotations of TDM findings.
  security-events: write

jobs:
  build-test-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build --no-restore -warnaserror

      - name: Test
        run: dotnet test --no-build

      # Dogfoods the composite action (W1-P3). The write-repository policy gate (ADR-0001)
      # and full feature validation run against the demo settings: a PR that adds an entity
      # without a write repository, or a feature step that no longer parses, fails here —
      # before any data exists.
      - name: TDM validate (policy gate)
        uses: ./.github/actions/tdm
        with:
          command: validate
          settings: tdm.settings.json
          tool: dotnet run --project src/Tdm.Host --no-build --
          report-sarif: output/tdm-validate.sarif
          report-junit: output/tdm-validate.junit.xml
          manifest-artifact: tdm-validate-manifest

      # The editor model must not drift from the actual resolved schema (W4-D2 risk
      # mitigation): regenerate tdm.model.json and fail if it differs from the committed one.
      - name: Model export drift check
        run: |
          dotnet run --project src/Tdm.Host --no-build -- export-model --settings tdm.settings.json --out tdm.model.json
          git diff --exit-code tdm.model.json

      - name: Upload SARIF (PR annotations)
        if: ${{ always() && hashFiles('output/tdm-validate.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: output/tdm-validate.sarif
          category: tdm

      - name: Upload JUnit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tdm-validate-junit
          path: output/tdm-validate.junit.xml
          if-no-files-found: ignore

  # Provider container matrix (W3-P3): the same EfCore + integration suites run against
  # SQL Server and PostgreSQL via Testcontainers (SQLite is the default leg above).
  provider-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        provider: [SqlServer, PostgreSql]
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build --no-restore -warnaserror

      - name: Test on ${{ matrix.provider }}
        env:
          TDM_TEST_PROVIDER: ${{ matrix.provider }}
        run: |
          dotnet test tests/Tdm.EfCore.Tests --no-build
          dotnet test tests/Tdm.Integration.Tests --no-build
